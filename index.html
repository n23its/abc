<!doctype html>
<html lang="sa">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>संकल्प संग्रह</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0f1117;
        color: white;
        font-family: sans-serif;
        /* पूरे पेज को स्क्रॉल होने से रोकें, केवल अंदर के भाग स्क्रॉल होंगे */
        overflow: hidden; 
      }

      .container {
        display: flex;
        height: 100vh;
        width: 100vw;
      }

      /* SIDEBAR */
      .sidebar {
        width: 340px;
        background: #171c24;
        border-right: 1px solid #2d3748;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
      }

      .sidebar h1 {
        font-size: 28px;
        margin-bottom: 20px;
      }

      .button-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .button-grid button {
        background: #242b36;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 10px;
        text-align: left;
        cursor: pointer;
        transition: 0.2s;
        font-size: 16px;
        font-family: inherit;
      }

      .button-grid button:hover {
        background: #374151;
      }

      /* MAIN */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 40px;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        flex-shrink: 0;
      }

      .toolbar button {
        background: #4f46e5;
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
        font-family: inherit;
        transition: opacity 0.2s;
      }

      .toolbar button:hover {
        opacity: 0.9;
      }

      #output {
        white-space: pre-wrap;
        line-height: 2.1;
        font-size: 20px;
        background: #161b22;
        border: 1px solid #2d3748;
        border-radius: 16px;
        padding: 30px;
        flex: 1;
      }

      /* =========================================
         MOBILE & TABLET RESPONSIVENESS
      ========================================= */

      /* Tablets & Smaller screens */
      @media (max-width: 900px) {
        .container {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          height: 45vh; /* स्क्रीन का 45% हिस्सा साइडबार के लिए */
          border-right: none;
          border-bottom: 2px solid #2d3748;
          padding: 15px;
        }

        .sidebar h1 {
          font-size: 22px;
          margin-bottom: 15px;
        }

        /* टेबलेट पर बटन्स को 2 कॉलम में दिखाएं */
        .button-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
        }

        .button-grid button {
          font-size: 15px;
          padding: 12px;
          text-align: center;
        }

        .main {
          height: 55vh; /* स्क्रीन का 55% हिस्सा आउटपुट के लिए */
          padding: 15px;
        }

        .toolbar {
          margin-bottom: 15px;
        }

        .toolbar button {
          padding: 10px 14px;
          font-size: 14px;
        }

        #output {
          font-size: 16px; /* मोबाइल पर फॉन्ट साइज़ थोड़ा छोटा */
          line-height: 1.8;
          padding: 20px;
          border-radius: 12px;
        }
      }

      /* Phones (Small screens) */
      @media (max-width: 480px) {
        .sidebar {
          height: 40vh; /* फोन पर साइडबार को थोड़ा छोटा करें */
        }

        .main {
          height: 60vh; /* फोन पर आउटपुट एरिया को ज्यादा जगह दें */
        }

        .button-grid {
          grid-template-columns: 1fr; /* फोन पर बटन्स वापस 1 ही कॉलम में */
        }

        .button-grid button {
          text-align: left;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- SIDEBAR -->

      <div class="sidebar">
        <h1>संकल्प संग्रह</h1>

        <div class="button-grid">
          <button onclick="generateSankalpa('samanya_devapujan')">सामान्य देवपूजन</button>
          <button onclick="generateSankalpa('griha_pravesha')">गृहप्रवेश</button>
          <button onclick="generateSankalpa('vastu_shanti')">वास्तुशान्ति</button>
          <button onclick="generateSankalpa('bhumi_pujan')">भूमिपूजन</button>
          <button onclick="generateSankalpa('shilanyasa')">शिलान्यास</button>
          <button onclick="generateSankalpa('vivaha')">विवाह</button>
          <button onclick="generateSankalpa('mangalik_dosha_shanti')">माङ्गलिक दोष शान्ति</button>
          <button onclick="generateSankalpa('arka_vivaha')">अर्क विवाह</button>
          <button onclick="generateSankalpa('ghata_vivaha')">घट विवाह</button>
          <button onclick="generateSankalpa('upanayana')">उपनयन</button>
          <button onclick="generateSankalpa('yajnopavita_dharana')">यज्ञोपवीत धारण</button>
          <button onclick="generateSankalpa('namakarana')">नामकरण</button>
          <button onclick="generateSankalpa('arka_vivaha')">अर्क विवाह</button>
          <button onclick="generateSankalpa('annaprashana')">अन्नप्राशन</button>
          <button onclick="generateSankalpa('chudakarma')">चूडाकर्म / मुंडन</button>
          <button onclick="generateSankalpa('janmapatri_pujan')">जन्मपत्री पूजन</button>
          <button onclick="generateSankalpa('mula_shanti')">मूल शान्ति</button>
          <button onclick="generateSankalpa('navagraha_shanti')">नवग्रह शान्ति</button>
          <button onclick="generateSankalpa('vyavasaya_arambha')">व्यवसायारम्भ</button>
          <button onclick="generateSankalpa('madhya_mandala_puja')">मध्य-मण्डल पूजा</button>
          <button onclick="generateSankalpa('karyalaya_pujan')">कार्यालय पूजन</button>
          <button onclick="generateSankalpa('deepavali_lakshmi_pujan')">लक्ष्मी पूजन</button>
          <button onclick="generateSankalpa('satyanarayana_puja')">सत्यनारायण पूजा</button>
          <button onclick="generateSankalpa('ganesha_pujan')">गणेश पूजन</button>
          <button onclick="generateSankalpa('durga_pujan')">दुर्गा / देवी पूजन</button>
          <button onclick="generateSankalpa('rudrabhisheka')">रुद्राभिषेक</button>
          <button onclick="generateSankalpa('maha_mrityunjaya_japa')">महामृत्युंजय जप</button>
          <button onclick="generateSankalpa('havana_homa')">हवन / होम</button>
        </div>
      </div>

      <!-- MAIN -->


      <div class="main">
        <div class="toolbar">
          <button onclick="copyOutput()">Copy</button>
          <button onclick="downloadTxt()">Download</button>
        </div>

        <div id="output">संकल्प चयन करें...</div>
      </div>
    </div>

    <!-- JS FILE -->
    <script src="index.js"></script>

    <!-- MAIN FUNCTIONS -->
    <script>
      function generateSankalpa(ritualKey) {
        const ritual = sankalpaCollection[ritualKey];

        if (!ritual) {
          return;
        }

        const finalOutput =
          renderTemplate(BASE_TEMPLATE, GLOBAL_DATA) + ritual.template;

        document.getElementById("output").innerText = finalOutput;
        
        // (Optional) Mobile पर बटन क्लिक करने के बाद आउटपुट को ऊपर स्क्रॉल करने के लिए
        document.querySelector('.main').scrollTo({ top: 0, behavior: 'smooth' });
      }

      function copyOutput() {
        const text = document.getElementById("output").innerText;
        navigator.clipboard.writeText(text);
        alert("Copied");
      }

      function downloadTxt() {
        const text = document.getElementById("output").innerText;
        const blob = new Blob([text], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "sankalpa.txt";
        a.click();
      }
    </script>
  </body>
</html>
